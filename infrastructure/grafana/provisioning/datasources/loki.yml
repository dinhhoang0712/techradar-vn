apiVersion: 1

# Auto-provisioned Loki datasource so Grafana is query-ready on first boot.
datasources:
  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    isDefault: true
    jsonData:
      # Turn the trace id in a log line into a clickable filter.
      derivedFields:
        - name: TraceID
          matcherRegex: '"(?:traceId|request_id)":"([^"]+)"'
          label: TraceID
