server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /test {
        add_header Content-Type text/plain;
        return 200 "Nginx OK - Frontend connected to backend";
    }

    # SPA: serve files, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gateway proxy. The SPA calls relative /api/v1/* (see src/utils/apiClient.js),
    # so Nginx forwards everything under /api to the Spring WebFlux gateway unchanged.
    location /api/ {
        proxy_pass http://spring-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (chat stream at /api/v1/chat/stream): disable buffering
        # so tokens flush to the browser immediately, and keep the connection open.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Proxied-By "TechRadar-Nginx" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
