# Promtail — discovers all compose containers via the Docker API and ships their stdout to Loki.
#
# For our app services (spring-api, ai-rag-core, ml-clustering) the stdout is JSON, so we parse it
# and promote `service` + `level` to labels (low cardinality). The trace id (`traceId`/`request_id`)
# is deliberately NOT a label — query it at read time with LogQL, e.g.
#     {service="ai-rag-core"} | json | request_id="abc123"
# Infra containers (postgres, neo4j, kafka, …) are still shipped, just unparsed.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name without the leading slash.
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # compose service name (spring-api, ai-rag-core, …) -> label.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      # Only scrape containers from this project's compose stack.
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: 'techradar-vn'
        action: keep
    pipeline_stages:
      # Parse JSON only for our app services; extract structured fields.
      - match:
          selector: '{compose_service=~"spring-api|ai-rag-core|ml-clustering"}'
          stages:
            - json:
                expressions:
                  service: service
                  level: level
                  logger: logger
            - labels:
                service:
                level:
