# TechRadar VN — full-stack packaging.
#
#   docker compose up --build                 # core app stack (web + gateway + python + datastores)
#   docker compose --profile vector up --build # also start the Kafka -> qdrant-writer -> Qdrant pipeline
#
# Inter-service wiring (hostnames, bundled-datastore credentials) is hard-coded below so a stray
# cloud-oriented .env can never break it. Only secrets/toggles are read from .env (see .env.docker.example).
name: techradar-vn

services:

  # ----------------------------- Frontend (React SPA + Nginx) -----------------------------
  web:
    build:
      context: ./apps/web
    image: techradar/web:latest
    container_name: techradar-web
    ports:
      - "5173:80"          # http://localhost:5173  (Nginx proxies /api -> spring-api)
    depends_on:
      - spring-api
    restart: unless-stopped

  # ----------------------------- API Gateway (Spring Boot WebFlux) ------------------------
  spring-api:
    build:
      context: ./apps/backend
    image: techradar/backend:latest
    container_name: techradar-spring-api
    ports:
      - "8080:8080"
    environment:
      # dev = applies seed (admin@techradar.vn / Admin@12345) + verbose logs; prod = no seed.
      # The 'json' profile makes Logback emit structured JSON (scraped by Promtail -> Loki) while
      # keeping the dev seed. Drop ',json' (or set APP_ENV=dev) for plain human-readable console logs.
      APP_ENV: ${APP_ENV:-dev,json}
      # Postgres (R2DBC runtime + Flyway migrations at startup)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: techradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Neo4j (graph + analytics ETL)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
      # Python services
      PYTHON_RAG_BASE_URL: http://ai-rag-core:8000
      PYTHON_AI_BASE_URL: http://ai-rag-core:8000
      PYTHON_ML_CLUSTERING_BASE_URL: http://ml-clustering:8001
      PYTHON_INTERNAL_TOKEN: ${INTERNAL_API_TOKEN:-techradar-internal-secret}
      # Mail (MailHog — UI at http://localhost:8025)
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM: no-reply@techradar.vn
      # Kafka (only reachable under `--profile vector`; harmless retries otherwise)
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Redis (token blacklist, cache, rate limiting)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Auth / web
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-with-at-least-256-bits}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      WEB_RESET_URL: ${WEB_RESET_URL:-http://localhost:5173/login}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      ai-rag-core:
        condition: service_started
      ml-clustering:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped

  # ----------------------------- RAG chat service (FastAPI) -------------------------------
  ai-rag-core:
    build:
      context: ./services/ai-rag-core
    image: techradar/ai-rag-core:latest
    container_name: techradar-rag
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      USE_LOCAL_NEO4J: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: techradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      # Must match spring-api's PYTHON_INTERNAL_TOKEN (gateway -> /chat, /internal/ai/*)
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-techradar-internal-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MODEL_WARMUP: ${MODEL_WARMUP:-background}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # ----------------------------- ML clustering service (FastAPI) --------------------------
  ml-clustering:
    build:
      context: ./services/ml-clustering
    image: techradar/ml-clustering:latest
    container_name: techradar-clustering
    ports:
      - "8001:8001"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      USE_LOCAL_NEO4J: "false"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MLCLUSTER_S3_CACHE_DIR: /tmp/ml-clustering-cache
      # Optional S3 artifacts (snapshot parquet + cluster_labels.json) — leave blank to skip.
      MLCLUSTER_S3_BUCKET: ${MLCLUSTER_S3_BUCKET:-}
      MLCLUSTER_S3_PREFIX: ${MLCLUSTER_S3_PREFIX:-ml-clustering}
      MLCLUSTER_S3_REGION: ${MLCLUSTER_S3_REGION:-ap-southeast-1}
      MLCLUSTER_S3_ACCESS_KEY_ID: ${MLCLUSTER_S3_ACCESS_KEY_ID:-}
      MLCLUSTER_S3_SECRET_ACCESS_KEY: ${MLCLUSTER_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - ml_clustering_cache:/tmp/ml-clustering-cache
    depends_on:
      neo4j:
        condition: service_started
    restart: unless-stopped

  # ----------------------------- Datastores ----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: techradar-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: techradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d techradar"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: techradar-neo4j
    ports:
      - "7474:7474"     # Browser UI
      - "7687:7687"     # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: techradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: techradar-mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI -> http://localhost:8025
    restart: unless-stopped

  # ----------------------------- MinIO (Bronze/Silver object storage) --------------------
  minio:
    image: minio/minio:latest
    container_name: techradar-minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console UI -> http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------- Data Platform (Bronze + Silver + Gold + Scheduler) ------
  data-platform:
    build:
      context: ./data-platform
    image: techradar/data-platform:latest
    container_name: techradar-data-platform
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/techradar
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      RAG_BASE_URL: http://ai-rag-core:8000
      EMBED_SECRET: ${EMBED_SECRET:-changeme}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-techradar-internal-secret}
    depends_on:
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    restart: unless-stopped

  # ----------------------------- Crawler (opt-in: --profile crawl) ----------------------
  # docker compose --profile crawl up -d
  # Chạy tất cả crawlers tuần tự, lặp mỗi 6 giờ, đẩy data vào Kafka.
  crawler:
    build:
      context: ./services/crawler
    image: techradar/crawler:latest
    container_name: techradar-crawler
    profiles: ["crawl"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CRAWL_INTERVAL_HOURS: ${CRAWL_INTERVAL_HOURS:-6}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - crawler_data:/app/data
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  # Kafka runs by default: it backs the ingestion pipeline AND the notification domain events
  # (trend.alerts → NotificationDispatcher). The backend tolerates its absence, but with it up
  # the event-driven features work out of the box.
  kafka:
    image: apache/kafka:3.7.0
    container_name: techradar-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  # ----------------------------- Vector store + writer (opt-in: --profile vector) ---------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: techradar-qdrant
    profiles: ["vector"]
    ports:
      - "6333:6333"     # HTTP
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  qdrant-writer:
    build:
      context: ./services/qdrant-writer
    container_name: techradar-qdrant-writer
    profiles: ["vector"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      VECTOR_DIM: "768"
    depends_on:
      - kafka
      - qdrant
    restart: unless-stopped

  # ----------------------------- Centralized logging (opt-in: --profile observability) ----
  # Promtail scrapes every techradar-vn container's stdout -> Loki -> explore/query in Grafana.
  #   docker compose --profile observability up -d
  #   Grafana: http://localhost:3001  (anonymous Admin; Explore -> Loki)
  loki:
    image: grafana/loki:3.1.1
    container_name: techradar-loki
    profiles: ["observability"]
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: techradar-promtail
    profiles: ["observability"]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: techradar-grafana
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  qdrant_data:
  ml_clustering_cache:
  minio_data:
  crawler_data:
  loki_data:
  grafana_data:
  promtail_positions:
